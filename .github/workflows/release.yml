name: Release

on:
  push:
    tags: ['v*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.7 or v1.7.1)'
        required: true

permissions:
  contents: write   # gh release create + push the appcast commit

jobs:
  release:
    name: Build, sign, notarize, publish
    runs-on: macos-26
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
      sha256: ${{ steps.shasum.outputs.sha256 }}

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Derive version
        id: ver
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need full history so the appcast commit lands cleanly

      - name: Select Xcode
        run: |
          set -euo pipefail
          for app in \
            /Applications/Xcode_26.5.app \
            /Applications/Xcode_26.5_beta_2.app \
            /Applications/Xcode_26.4.1.app \
            /Applications/Xcode_26.4.app \
            /Applications/Xcode_26.4_Release_Candidate.app; do
            if [ -d "$app" ]; then
              echo "DEVELOPER_DIR=$app/Contents/Developer" >> "$GITHUB_ENV"
              echo "Selected $app"
              exit 0
            fi
          done
          echo "No Xcode 26.4+ install found" >&2
          ls -1 /Applications | grep '^Xcode' || true
          exit 1

      - name: Install dmgbuild
        run: |
          # macOS runner Python is externally managed (PEP 668);
          # pipx handles its own venv so `dmgbuild` lands on PATH cleanly.
          brew install pipx
          pipx install dmgbuild
          # Confirm it's on PATH for subsequent steps.
          dmgbuild --help >/dev/null

      - name: Install Sparkle tools
        env:
          # Keep in lockstep with the Sparkle SwiftPM version in Package.resolved.
          SPARKLE_VERSION: "2.9.2"
        run: |
          set -euo pipefail
          TARBALL="$RUNNER_TEMP/sparkle.tar.xz"
          curl -fsSL -o "$TARBALL" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$TARBALL" -C "$RUNNER_TEMP/sparkle"
          # Expose sign_update / generate_appcast on PATH for later steps.
          echo "$RUNNER_TEMP/sparkle/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/sparkle/bin/sign_update" -h >/dev/null 2>&1 || true
          echo "Sparkle ${SPARKLE_VERSION} CLI tools installed at $RUNNER_TEMP/sparkle/bin"

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          echo "$MACOS_CERTIFICATE" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Set marketing version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          xcrun agvtool new-marketing-version "$VERSION"
          xcrun agvtool new-version -all "${GITHUB_RUN_NUMBER:-1}"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project agent-deck.xcodeproj \
            -scheme agent-deck

      - name: Archive
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -o pipefail
          mkdir -p build/release
          xcodebuild archive \
            -project agent-deck.xcodeproj \
            -scheme agent-deck \
            -configuration Release \
            -archivePath build/release/agent-deck.xcarchive \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=D37Z4S3883 \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp" 2>&1 | tee build/release/archive.log

      - name: Export .app
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          cat > build/release/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>developer-id</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>D37Z4S3883</string>
            <key>stripSwiftSymbols</key><true/>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/release/agent-deck.xcarchive \
            -exportPath build/release/export \
            -exportOptionsPlist build/release/ExportOptions.plist

      - name: Inject Sparkle Info.plist keys
        # Xcode 26 silently drops non-Apple INFOPLIST_KEY_* build settings,
        # so SUFeedURL / SUPublicEDKey / etc. never make it into the
        # generated Info.plist. PlistBuddy them in directly here, on the
        # already-exported .app, before signing the DMG. Keep these values
        # in sync with scripts/inject-sparkle-info.sh.
        #
        # We ALSO force the version keys here: `agvtool new-marketing-version`
        # was not reliably updating CFBundleShortVersionString in the build
        # (shipped 1.1 still reported 1.0 in the About panel), so we set both
        # the marketing version (from the tag) and the build number
        # (GITHUB_RUN_NUMBER) directly on the exported app. This is the final
        # word on the Info.plist before signing.
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          PLIST="build/release/export/Agent Deck.app/Contents/Info.plist"
          # Version (marketing = tag, build = run number).
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${GITHUB_RUN_NUMBER}" "$PLIST"
          /usr/libexec/PlistBuddy -c \
            "Add :SUFeedURL string https://agentdeck.site/appcast.xml" \
            "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c \
            "Set :SUFeedURL https://agentdeck.site/appcast.xml" \
            "$PLIST"
          /usr/libexec/PlistBuddy -c \
            "Add :SUPublicEDKey string CWncStYBPVugWOxjexH1nhbtMiUedfr62Zq/Colmf6U=" \
            "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c \
            "Set :SUPublicEDKey CWncStYBPVugWOxjexH1nhbtMiUedfr62Zq/Colmf6U=" \
            "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :SUEnableAutomaticChecks bool YES" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :SUEnableAutomaticChecks YES" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :SUScheduledCheckInterval integer 86400" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :SUScheduledCheckInterval 86400" "$PLIST"
          # Re-sign the .app since we mutated its Info.plist after Xcode signed it.
          codesign --force --options runtime --timestamp \
            --sign "${{ secrets.MACOS_SIGN_IDENTITY }}" \
            "build/release/export/Agent Deck.app"
          # Verify the keys are present + the signature is still valid.
          /usr/libexec/PlistBuddy -c "Print :SUFeedURL" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :SUPublicEDKey" "$PLIST"
          codesign --verify --deep --strict "build/release/export/Agent Deck.app"

      - name: Build branded DMG
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          DMG="build/release/Agent-Deck-${VERSION}.dmg"
          # dmgbuild writes the .DS_Store directly (no Finder/AppleScript
          # involvement) so window bounds + chrome state + icon positions
          # are deterministic and match local previews exactly.
          dmgbuild \
            -s scripts/dmg/dmg-config.py \
            -D "app=build/release/export/Agent Deck.app" \
            -D background=scripts/dmg/background.png \
            "Agent Deck" \
            "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Sign DMG
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          codesign --force --timestamp --sign "$SIGN_IDENTITY" "$DMG"

      - name: Notarize and staple
        env:
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$NOTARY_KEY" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          spctl --assess --type open --context context:primary-signature -v "$DMG"

      - name: Stable-name copy and checksums
        # Must run AFTER stapling: the staple rewrites the DMG, so hashes taken
        # earlier would not match what users download. The stable-named copy
        # (identical bytes) gives the website and install script a permanent
        # `releases/latest/download/Agent-Deck.dmg` URL; the .sha256 files let
        # the install script and the Homebrew cask verify downloads.
        id: shasum
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          cp "$DMG" "build/release/Agent-Deck.dmg"
          # Bare filenames inside the .sha256 files so `shasum -c` works from
          # any directory containing the download.
          (
            cd build/release
            shasum -a 256 "Agent-Deck-${VERSION}.dmg" > "Agent-Deck-${VERSION}.dmg.sha256"
            shasum -a 256 "Agent-Deck.dmg" > "Agent-Deck.dmg.sha256"
            cat ./*.sha256
          )
          echo "STABLE_DMG=build/release/Agent-Deck.dmg" >> "$GITHUB_ENV"
          echo "sha256=$(cut -d' ' -f1 < "build/release/Agent-Deck-${VERSION}.dmg.sha256")" >> "$GITHUB_OUTPUT"

      - name: Sign update with Sparkle EdDSA key
        id: edsig
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # sign_update accepts the raw base64 private key via --ed-key-file.
          # Use process substitution so the key never lands on disk.
          SIG_LINE=$(sign_update --ed-key-file <(printf '%s' "$SPARKLE_PRIVATE_KEY") "$DMG")
          # SIG_LINE looks like:  sparkle:edSignature="..." length="..."
          echo "fragment=$SIG_LINE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          # Preferred source: release notes authored in the app, which ride in
          # the annotated tag's message (the in-app Release sheet drafts them with
          # the default model, lets you edit, then tags with that body). Fall back
          # to listing the commits between the previous version tag and this one
          # when the tag is lightweight or its message is just the tag name
          # (manual scripts/release.sh, or the app's "no notes" path). The appcast
          # step reads this release body and renders it (as HTML) in the Sparkle
          # update dialog.
          git fetch --tags --force --quiet || true
          PREV_TAG=$(git tag --list 'v*.*' --sort=-v:refname | grep -vx "$TAG" | head -1 || true)

          # Annotated tag message, minus any trailing signature block.
          TAG_BODY=$(git for-each-ref "refs/tags/${TAG}" --format='%(contents)' \
                     | sed '/-----BEGIN PGP SIGNATURE-----/,$d')
          # Treat it as authored notes only when it's more than just the tag/version name.
          TAG_BODY_TRIMMED=$(printf '%s' "$TAG_BODY" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

          if [ -n "$TAG_BODY_TRIMMED" ] && [ "$TAG_BODY_TRIMMED" != "$TAG" ] && [ "$TAG_BODY_TRIMMED" != "$VERSION" ]; then
            NOTES=$(printf '## What'\''s new in %s\n\n%s\n' "$VERSION" "$TAG_BODY_TRIMMED")
          elif [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..${TAG}" --no-merges --pretty=format:'- %s' \
                      | grep -vE '^- (appcast|Initial commit)' || true)
            if [ -z "$COMMITS" ]; then
              COMMITS="- Maintenance and internal improvements"
            fi
            NOTES=$(printf '## What'\''s new in %s\n\n%s\n' "$VERSION" "$COMMITS")
          else
            NOTES=$(printf '## Agent Deck %s\n\nFirst public release.\n' "$VERSION")
          fi

          printf '%s' "$NOTES" > release-notes.md
          echo "----- release notes -----"
          cat release-notes.md
          echo "-------------------------"

          gh release create "$TAG" \
            --title "Agent Deck $VERSION" \
            --notes-file release-notes.md \
            "$DMG" "$STABLE_DMG" "${DMG}.sha256" "${STABLE_DMG}.sha256"

      - name: Publish appcast item asset
        # Instead of committing docs/appcast.xml back to main (which polluted
        # history with one bot commit per release), we attach the fully-formed
        # Sparkle <item> as an `appcast-item.xml` release asset. agentdeck.site
        # serves /appcast.xml dynamically by stitching these fragments together
        # from the live releases list — no commits here, no site redeploy.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          ED_FRAGMENT: ${{ steps.edsig.outputs.fragment }}
        run: |
          set -euo pipefail
          export PUBDATE=$(LC_ALL=en_US.UTF-8 date -u "+%a, %d %b %Y %H:%M:%S +0000")
          export MIN_OS=$(awk -F'= ' '/MACOSX_DEPLOYMENT_TARGET/ {gsub(/[";]/,"",$2); print $2; exit}' agent-deck.xcodeproj/project.pbxproj)
          export MIN_OS=${MIN_OS:-14.0}

          # Sparkle renders the <description> as HTML, so we convert the
          # GitHub release notes (markdown) to HTML — otherwise users see raw
          # "**bold**" / unlinked URLs in the update dialog.
          pip3 install --break-system-packages --quiet markdown

          python3 - <<'PY'
          import os, subprocess, markdown
          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          ed = os.environ["ED_FRAGMENT"]
          run = os.environ["GITHUB_RUN_NUMBER"]
          repo = os.environ["GITHUB_REPOSITORY"]
          min_os = os.environ["MIN_OS"]
          pubdate = os.environ["PUBDATE"]
          version_parts = version.split(".")
          is_major_release = len(version_parts) == 2 and version_parts[1] == "0"
          should_phase_release = not is_major_release

          notes_md = subprocess.check_output(
              ["gh", "release", "view", tag, "--json", "body", "--jq", ".body"],
              text=True,
          ).strip()
          notes_html = markdown.markdown(notes_md, extensions=["fenced_code", "tables"])
          if not notes_html.strip():
              notes_html = f'<p><a href="https://github.com/{repo}/releases/tag/{tag}">Release notes</a></p>'
          # CDATA can't contain the literal "]]>" sequence — split it if present.
          notes_html = notes_html.replace("]]>", "]]]]><![CDATA[>")

          url = f"https://github.com/{repo}/releases/download/{tag}/Agent-Deck-{version}.dmg"
          lines = [
              "    <item>",
              f"      <title>{version}</title>",
              f"      <pubDate>{pubdate}</pubDate>",
              f"      <sparkle:version>{run}</sparkle:version>",
              f"      <sparkle:shortVersionString>{version}</sparkle:shortVersionString>",
              f"      <sparkle:minimumSystemVersion>{min_os}</sparkle:minimumSystemVersion>",
          ]
          if should_phase_release:
              # Patch and minor releases are still visible immediately to manual checks,
              # while scheduled checks roll out across Sparkle's seven groups.
              lines.append("      <sparkle:phasedRolloutInterval>86400</sparkle:phasedRolloutInterval>")
          lines += [
              f'      <enclosure url="{url}" type="application/octet-stream" {ed}/>',
              "      <description><![CDATA[",
              notes_html,
              "      ]]></description>",
              "    </item>",
          ]
          item = "\n".join(lines)
          with open("appcast-item.xml", "w") as f:
              f.write(item + "\n")
          print(item)
          PY

          # --clobber so re-running a release for the same tag overwrites cleanly.
          gh release upload "$TAG" appcast-item.xml --clobber

  bump-cask:
    # Keeps `brew install --cask a-streetcoder/tap/agent-deck` pointing at the
    # release that just shipped. Regenerates the whole cask file from a template
    # (idempotent; also bootstraps Casks/agent-deck.rb if the tap is empty).
    # Skips with a warning when the TAP_PUSH_TOKEN secret is missing so a
    # missing token never blocks a release.
    name: Bump Homebrew cask
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: token
        env:
          TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::TAP_PUSH_TOKEN secret not set - skipping Homebrew cask bump. Create a fine-grained PAT with Contents read/write on a-streetcoder/homebrew-tap and add it as the TAP_PUSH_TOKEN secret."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out tap
        if: steps.token.outputs.present == 'true'
        uses: actions/checkout@v5
        with:
          repository: a-streetcoder/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}

      - name: Rewrite cask
        if: steps.token.outputs.present == 'true'
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA256: ${{ needs.release.outputs.sha256 }}
        run: |
          set -euo pipefail
          mkdir -p Casks
          # Quoted heredoc keeps Ruby's #{version} interpolation literal; the
          # placeholders are substituted afterwards with sed.
          cat > Casks/agent-deck.rb <<'RUBY'
          cask "agent-deck" do
            version "__VERSION__"
            sha256 "__SHA256__"

            url "https://github.com/a-streetcoder/agent-deck/releases/download/v#{version}/Agent-Deck-#{version}.dmg",
                verified: "github.com/a-streetcoder/agent-deck/"
            name "Agent Deck"
            desc "Workspace for the Pi coding agent"
            homepage "https://agentdeck.site/"

            livecheck do
              url "https://github.com/a-streetcoder/agent-deck"
              strategy :github_latest
            end

            # The app updates itself through Sparkle; this keeps a plain
            # `brew upgrade` from fighting the in-app updater.
            auto_updates true
            depends_on formula: "pi-coding-agent"
            depends_on macos: ">= :tahoe"
            depends_on arch: :arm64

            app "Agent Deck.app"

            zap trash: [
              "~/Library/Application Support/Agent Deck",
              "~/Library/Caches/streetcoding.agent-deck",
              "~/Library/HTTPStorages/streetcoding.agent-deck",
              "~/Library/Preferences/streetcoding.agent-deck.plist",
              "~/Library/Saved Application State/streetcoding.agent-deck.savedState",
            ]

            caveats <<~EOS
              Agent Deck uses the Pi CLI. Homebrew installed (or verified) the
              pi-coding-agent formula as a dependency. If you already had Pi from
              npm or pi.dev's installer, the Homebrew copy may shadow it depending
              on PATH; Agent Deck's Doctor shows exactly which pi the app uses.
            EOS
          end
          RUBY
          sed -i "s/__VERSION__/${VERSION}/; s/__SHA256__/${SHA256}/" Casks/agent-deck.rb
          cat Casks/agent-deck.rb

      - name: Commit and push
        if: steps.token.outputs.present == 'true'
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "agent-deck-release-bot"
          git config user.email "noreply@github.com"
          git add Casks/agent-deck.rb
          if git diff --cached --quiet; then
            echo "Cask already at ${VERSION}; nothing to push."
            exit 0
          fi
          git commit -m "agent-deck ${VERSION}"
          # Daily releases can race a manual tap edit; rebase-and-retry once.
          git push || { git pull --rebase && git push; }
